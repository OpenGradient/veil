name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (incl. PII extra)
        run: uv sync --all-groups --extra pii

      - name: Install spaCy model for PII tests
        # Installed from the release wheel rather than `spacy download`, whose CLI
        # breaks under the click version this project pins. Not needed at runtime,
        # only to fetch the model.
        run: uv pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl

      - name: Test
        run: make test
